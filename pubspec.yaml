name: smart_keyboard
description: >-
  A Flutter plugin for real-time keyboard height tracking with configurable
  throttling, and programmatic keyboard show/hide on iOS and Android.
version: 0.1.0
homepage: https://github.com/smart-keyboard/smart_keyboard

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.smart.keyboard
        pluginClass: SmartKeyboardPlugin
      ios:
        pluginClass: SmartKeyboardPlugin
